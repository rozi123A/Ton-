services:
  - type: web
    name: connective
    runtime: node
    plan: free
    buildCommand: pnpm install --no-frozen-lockfile && pnpm run build
    preDeployCommand: npx drizzle-kit push --force
    startCommand: NODE_ENV=production node dist/index.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: SESSION_SECRET
        sync: false
      - key: NODE_ENV
        value: production
